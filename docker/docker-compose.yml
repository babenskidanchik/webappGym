version: "3.9"

services:
  db:
    image: postgres:16
    container_name: gym_postgres
    restart: always
    environment:
      POSTGRES_USER: gym
      POSTGRES_PASSWORD: gym123
      POSTGRES_DB: gym_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: